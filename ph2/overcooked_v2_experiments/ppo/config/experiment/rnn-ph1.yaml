# @package _global_
defaults:
  - override /model: rnn

# E3T 기반 설정
ALG_NAME: "PH1-E3T"
USE_PARTNER_MODELING: True
PRED_LOSS_COEF: 1.0
E3T_EPSILON: 0.0  # 기본은 0.1, 쉘 스크립트에서 0.0으로 덮어쓸 예정

# STA-PH1 Specific Configs
PH1_ENABLED: True
PH1_STATE_MODE: True
PH1_USE_PARTNER_PRED: True
PH1_BETA: 1.0
PH1_BETA_SCHEDULE_ENABLED: False
PH1_BETA_START: 0.0
PH1_BETA_END: 2.0
# -1 => auto horizon: TOTAL_TIMESTEPS - PH1_WARMUP_STEPS
PH1_BETA_SCHEDULE_HORIZON_ENV_STEPS: -1
PH1_OMEGA: 1.0
PH1_SIGMA: 1.0
PH1_DISTANCE_THRESHOLD: 0.1 # 무의미한 개체
PH1_POOL_SIZE: 128
PH1_NORMAL_PROB: 0.5  # None (normal) 선택 확률
PH1_MULTI_PENALTY_ENABLED: False
PH1_MAX_PENALTY_COUNT: 1
PH1_MULTI_PENALTY_SINGLE_WEIGHT: 2.0
PH1_MULTI_PENALTY_OTHER_WEIGHT: 1.0
PH1_EPSILON: 0.0  # PH1 랜덤 행동 확률
PH1_WARMUP_STEPS: 0 # Warm-up steps (force normal target & no penalty)

# PH1 online evaluation during training
PH1_EVAL_ENABLED: True
PH1_EVAL_NUM_SEEDS: 1
PH1_EVAL_VIZ_EPISODES: 0
PH1_EVAL_VIZ_MAX_STEPS: 400
PH1_EVAL_ROLLOUT_MAX_STEPS: 400
PH1_EVAL_STOCHASTIC: False
PH1_EVAL_EVERY_ENV_STEPS: 1000000
PH1_EVAL_LOG_VIDEO: False
PH1_EVAL_DEFER_VIDEO: True
PH1_EVAL_DISABLE_JIT: True
PH1_EVAL_OFFLINE_ONLY: True
SAVE_EVAL_CHECKPOINTS: True
