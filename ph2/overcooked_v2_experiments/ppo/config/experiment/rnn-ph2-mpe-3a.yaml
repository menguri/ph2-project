# @package _global_
# MPE 3-Agent 환경 전용 PH2 config.
# 하이퍼파라미터는 2-agent와 동일. Action prediction 비활성화.
defaults:
  - override /model: rnn

ALG_NAME: "PH2-E3T"
USE_PARTNER_MODELING: False
PRED_LOSS_COEF: 0.0
STATE_PRED_LOSS_COEF: 0.0
E3T_EPSILON: 0.0
ACTION_PREDICTION: false
STATE_PREDICTION: false
PRED_Z_DIM: 64

PH1_ENABLED: True
PH1_STATE_MODE: True
PH1_USE_PARTNER_PRED: False
PH1_BETA: 1.0
PH1_BETA_SCHEDULE_ENABLED: False
PH1_BETA_START: 0.0
PH1_BETA_END: 2.0
PH1_BETA_SCHEDULE_HORIZON_ENV_STEPS: -1
PH1_OMEGA: 1.0
PH1_SIGMA: 1.0
PH1_DISTANCE_THRESHOLD: 0.1
PH1_POOL_SIZE: 128
PH1_NORMAL_PROB: 0.5
PH1_MULTI_PENALTY_ENABLED: False
PH1_MAX_PENALTY_COUNT: 1
PH1_MULTI_PENALTY_SINGLE_WEIGHT: 2.0
PH1_MULTI_PENALTY_OTHER_WEIGHT: 1.0
PH1_EPSILON: 0.0
PH2_EPSILON: -1.0
PH1_WARMUP_STEPS: 500000

PH1_EVAL_ENABLED: False
PH1_EVAL_NUM_SEEDS: 1
PH1_EVAL_VIZ_EPISODES: 0
PH1_EVAL_VIZ_MAX_STEPS: 25
PH1_EVAL_ROLLOUT_MAX_STEPS: 25
PH1_EVAL_STOCHASTIC: False
PH1_EVAL_EVERY_ENV_STEPS: 1000000
PH1_EVAL_LOG_VIDEO: False
PH1_EVAL_DEFER_VIDEO: True
PH1_EVAL_DISABLE_JIT: False
PH1_EVAL_OFFLINE_ONLY: True

PH2_RATIO_STAGE1: 2
PH2_RATIO_STAGE2: 1
PH2_RATIO_STAGE3: 2
PH2_FIXED_IND_PROB: 0.5
SHARED_PREDICTION: false
SAVE_EVAL_CHECKPOINTS: false
CYCLE_LOSS_ENABLED: false
CYCLE_LOSS_COEF: 0.1
Z_PREDICTION_ENABLED: false
Z_PRED_LOSS_COEF: 1.0
PH1_PAIR_MODE: false
PH1_RAW_DISTANCE: false

model:
  OBS_ENCODER: "MLP"
  LR: 0.0005
  NUM_ENVS: 256
  NUM_STEPS: 128
  NUM_MINIBATCHES: 4
  ACTIVATION: "tanh"
  UPDATE_EPOCHS: 4
  TOTAL_TIMESTEPS: 1e7
  ENT_COEF: 0.01
  VF_COEF: 1.0
  MAX_GRAD_NORM: 0.5
  CLIP_EPS: 0.3
  GRU_HIDDEN_DIM: 128
  FC_DIM_SIZE: 128
