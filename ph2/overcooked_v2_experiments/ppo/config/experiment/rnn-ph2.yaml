# @package _global_
defaults:
  - override /model: rnn

# PH2 (dual-train) base setup
ALG_NAME: "PH2-E3T"
USE_PARTNER_MODELING: True
PRED_LOSS_COEF: 1.0
STATE_PRED_LOSS_COEF: 1.0
E3T_EPSILON: 0.0
ACTION_PREDICTION: true
STATE_PREDICTION: false
# Default from GRU_HIDDEN_DIM=128 -> 64 (override via CLI as needed).
PRED_Z_DIM: 64

# Keep PH1 mechanics available (pool/sample/penalty), PH2 wrapper controls schedules.
PH1_ENABLED: True
PH1_STATE_MODE: True
PH1_USE_PARTNER_PRED: True
PH1_BETA: 1.0
PH1_BETA_SCHEDULE_ENABLED: False
PH1_BETA_START: 0.0
PH1_BETA_END: 2.0
# -1 => auto horizon: TOTAL_TIMESTEPS - PH1_WARMUP_STEPS
PH1_BETA_SCHEDULE_HORIZON_ENV_STEPS: -1
PH1_OMEGA: 1.0
PH1_SIGMA: 1.0
PH1_DISTANCE_THRESHOLD: 0.1
PH1_POOL_SIZE: 128
PH1_NORMAL_PROB: 0.5
PH1_MULTI_PENALTY_ENABLED: False
PH1_MAX_PENALTY_COUNT: 1
PH1_MULTI_PENALTY_SINGLE_WEIGHT: 2.0
PH1_MULTI_PENALTY_OTHER_WEIGHT: 1.0
PH1_EPSILON: 0.0
# PH2_EPSILON < 0 uses PH1_EPSILON fallback.
PH2_EPSILON: -1.0
PH1_WARMUP_STEPS: 0

# PH2 training does not run online eval, but keeps eval snapshot cadence for post-hoc eval.
PH1_EVAL_ENABLED: False
PH1_EVAL_NUM_SEEDS: 1
PH1_EVAL_VIZ_EPISODES: 0
PH1_EVAL_VIZ_MAX_STEPS: 400
PH1_EVAL_ROLLOUT_MAX_STEPS: 400
PH1_EVAL_STOCHASTIC: False
PH1_EVAL_EVERY_ENV_STEPS: 1000000
PH1_EVAL_LOG_VIDEO: False
PH1_EVAL_DEFER_VIDEO: True
PH1_EVAL_DISABLE_JIT: True
PH1_EVAL_OFFLINE_ONLY: True

# PH2 episode match schedule defaults
PH2_RATIO_STAGE1: 2
PH2_RATIO_STAGE2: 1
PH2_RATIO_STAGE3: 2
# Fixed ind-match probability default (50%). Set null to use stage schedule.
PH2_FIXED_IND_PROB: 0.5
# If True, spec/ind share the action predictor ("shared_predictor") parameters.
# Default False preserves legacy PH2 behavior and checkpoint compatibility.
SHARED_PREDICTION: false
# Cycle loss (CT OFF): sg(predictions) → CycleDecoder → z_hat ≈ sg(z_GRU), MSE
# ACTION_PREDICTION만 → sg(pred_logits)(6) → z_hat
# Z_PREDICTION + ACTION_PREDICTION → sg(z_partner_hat, pred_logits)(134) → z_hat
CYCLE_LOSS_ENABLED: false
CYCLE_LOSS_COEF: 0.1
# Partner Z prediction: sg(z_GRU) → ZPredictor → z_partner_hat ≈ partner_gru_z, MSE
# sg(z_partner_hat)를 policy input에 concat → dim: 128+128+6=262 (CT와 동일)
Z_PREDICTION_ENABLED: false
Z_PRED_LOSS_COEF: 1.0
# Pair mode: penalty state를 (원본 + Ch0↔Ch1 swap) 쌍으로 만들어 agent 순서 무관하게 penalty 적용
# ToyCoop 전용 — OV1/OV2에서는 false
PH1_PAIR_MODE: false
PH1_AGENTWISE_PENALTY: false
