# @package _global_
# ToyCoop (Dual Destination) 환경 전용 PH2 config.
defaults:
  - override /model: rnn

ALG_NAME: "PH2-E3T"
USE_PARTNER_MODELING: True
PRED_LOSS_COEF: 1.0
STATE_PRED_LOSS_COEF: 1.0
E3T_EPSILON: 0.0
ACTION_PREDICTION: true
STATE_PREDICTION: false
PRED_Z_DIM: 64

PH1_ENABLED: True
PH1_STATE_MODE: True
PH1_USE_PARTNER_PRED: True
PH1_BETA: 1.0
PH1_BETA_SCHEDULE_ENABLED: False
PH1_BETA_START: 0.0
PH1_BETA_END: 2.0
PH1_BETA_SCHEDULE_HORIZON_ENV_STEPS: -1
PH1_OMEGA: 0.1
PH1_SIGMA: 1.0
PH1_DISTANCE_THRESHOLD: 0.1
PH1_POOL_SIZE: 128
PH1_NORMAL_PROB: 0.5
PH1_MULTI_PENALTY_ENABLED: False
PH1_MAX_PENALTY_COUNT: 1
PH1_MULTI_PENALTY_SINGLE_WEIGHT: 2.0
PH1_MULTI_PENALTY_OTHER_WEIGHT: 1.0
PH1_EPSILON: 0.0
PH2_EPSILON: -1.0
PH1_WARMUP_STEPS: 0

PH1_EVAL_ENABLED: False
PH1_EVAL_NUM_SEEDS: 1
PH1_EVAL_VIZ_EPISODES: 0
PH1_EVAL_VIZ_MAX_STEPS: 100
PH1_EVAL_ROLLOUT_MAX_STEPS: 100
PH1_EVAL_STOCHASTIC: False
PH1_EVAL_EVERY_ENV_STEPS: 1000000
PH1_EVAL_LOG_VIDEO: False
PH1_EVAL_DEFER_VIDEO: True
PH1_EVAL_DISABLE_JIT: True
PH1_EVAL_OFFLINE_ONLY: True

PH2_RATIO_STAGE1: 2
PH2_RATIO_STAGE2: 1
PH2_RATIO_STAGE3: 2
PH2_FIXED_IND_PROB: 0.5
SHARED_PREDICTION: false
CYCLE_LOSS_ENABLED: false
CYCLE_LOSS_COEF: 0.1
Z_PREDICTION_ENABLED: false
Z_PRED_LOSS_COEF: 1.0
PH1_PAIR_MODE: false   # --pair-mode로 활성화
PH1_RAW_DISTANCE: false  # true: raw L2, false: MLP latent distance

model:
  OBS_ENCODER: "MLP"
  LR: 0.0003
  NUM_ENVS: 512
  NUM_STEPS: 100
  NUM_MINIBATCHES: 2
  UPDATE_EPOCHS: 4
  TOTAL_TIMESTEPS: 1e8
  ENT_COEF: 0.005
  VF_COEF: 1.0
  MAX_GRAD_NORM: 0.5
  CLIP_EPS: 0.2
