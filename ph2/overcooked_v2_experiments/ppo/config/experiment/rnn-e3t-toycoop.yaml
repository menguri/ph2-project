# @package _global_
# ToyCoop (Dual Destination) 환경 전용 E3T config.
defaults:
  - override /model: rnn

ALG_NAME: "E3T"
E3T_EPSILON: 0.5
USE_PARTNER_MODELING: True
PRED_LOSS_COEF: 1.0

model:
  OBS_ENCODER: "MLP"
  LR: 0.0003
  NUM_ENVS: 512
  NUM_STEPS: 100
  NUM_MINIBATCHES: 2
  UPDATE_EPOCHS: 4
  TOTAL_TIMESTEPS: 1e8
  ENT_COEF: 0.005
  VF_COEF: 1.0
  MAX_GRAD_NORM: 0.5
  CLIP_EPS: 0.2
