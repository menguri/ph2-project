# @package _global_
# MPE 3-Agent 환경 전용 E3T config. Action prediction 비활성화, mixed policy만 사용.
defaults:
  - override /model: rnn

ALG_NAME: "E3T"
E3T_EPSILON: 0.3
USE_PARTNER_MODELING: False
USE_PREDICTION: False
ACTION_PREDICTION: false
PRED_LOSS_COEF: 0.0

model:
  OBS_ENCODER: "MLP"
  LR: 0.0005
  NUM_ENVS: 256
  NUM_STEPS: 128
  NUM_MINIBATCHES: 4
  ACTIVATION: "tanh"
  UPDATE_EPOCHS: 4
  TOTAL_TIMESTEPS: 1e7
  ENT_COEF: 0.01
  VF_COEF: 1.0
  MAX_GRAD_NORM: 0.5
  CLIP_EPS: 0.3
  GRU_HIDDEN_DIM: 128
  FC_DIM_SIZE: 128
