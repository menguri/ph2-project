# @package _global_
# HSP Stage 1: N개 독립 self-play 정책을 random utility weight로 순차 학습
# HSP 논문 Table 9 기준 파라미터
defaults:
  - override /model: rnn

ALG_NAME: "HSP_S1"

HSP_POPULATION_SIZE: 36
HSP_SELECTED_K: 18
HSP_EVENT_DIM: 13       # 원본 HSP 13종 (인덱스 순서 원본과 동일)

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  OBS_ENCODER: "CNNGamma"         # 논문 [32,64,32] 3×3 SAME
  ACTIVATION: "relu"
  LR: 5e-4                        # 논문 Table 9: 5e-4
  ANNEAL_LR: False                 # 논문에 annealing 없음
  ENT_COEF: 0.01                   # 원본 HSP default 0.01
  VF_COEF: 1.0                     # 참조 코드 value_loss_coef=1.0
  GAE_LAMBDA: 0.95
  CLIP_EPS: 0.2
  MAX_GRAD_NORM: 10.0              # 논문 Table 9: 10.0
  UPDATE_EPOCHS: 15                # 원본 HSP ppo_epoch=15
  NUM_MINIBATCHES: 1               # 원본 HSP num_mini_batch=1
  HUBER_DELTA: 10.0                # 논문 Table 9: huber loss delta=10.0
  USE_REWARD_NORM: True            # 논문 Table 9: reward normalization=True
  USE_VALUENORM: True              # 논문 Table 9: use valuenorm=True
  NUM_ENVS: 100                    # 원본 n_rollout_threads=100
  NUM_STEPS: 400                   # 논문 episode_length=400
  TOTAL_TIMESTEPS: 1e7
  REW_SHAPING_HORIZON: 0           # utility weight만 사용, shaping annealing 없음
