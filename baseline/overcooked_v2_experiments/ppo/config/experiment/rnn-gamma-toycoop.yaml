# @package _global_
# GAMMA 통합 — ToyCoop 전용
defaults:
  - override /model: rnn

ALG_NAME: "GAMMA"

MEP_POPULATION_SIZE: 4
MEP_ENTROPY_ALPHA: 0.01
MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 1.0
S2_NUM_SEEDS: 10
GAMMA_S2_METHOD: "vae"

GAMMA_VAE_Z_DIM: 8
GAMMA_VAE_HIDDEN_DIM: 64
GAMMA_VAE_LR: 0.001
GAMMA_VAE_EPOCHS: 100
GAMMA_VAE_BATCH_SIZE: 64
GAMMA_VAE_CHUNK_LENGTH: 50
GAMMA_VAE_KL_PENALTY: 0.1
GAMMA_VAE_KL_INIT: 0.01
GAMMA_VAE_ROLLOUT_EPISODES: 100
GAMMA_VAE_Z_CHANGE_PROB: 0.0

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  OBS_ENCODER: "MLP"
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  LR: 0.0003
  NUM_ENVS: 512
  NUM_STEPS: 100
  NUM_MINIBATCHES: 2
  UPDATE_EPOCHS: 4
  TOTAL_TIMESTEPS: 1e8
  S2_TOTAL_TIMESTEPS: 1e8
  ENT_COEF: 0.005
  VF_COEF: 1.0
  MAX_GRAD_NORM: 0.5
  CLIP_EPS: 0.2
  GAE_LAMBDA: 0.9
  ANNEAL_LR: True
  LR_WARMUP: 0.05
