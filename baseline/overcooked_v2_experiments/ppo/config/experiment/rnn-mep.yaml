# @package _global_
# MEP 통합 config: S1(population) → S2(adaptive) 자동 진행
# 원본 MEP (zsc-basecamp/MEP, human_aware_rl/PBT) 파라미터에 정렬.
# 단, MEP_USE_PRIORITIZED_SAMPLING은 True 유지 (baseline 자체 추가 기능).
defaults:
  - override /model: rnn

ALG_NAME: "MEP"

# Population (S1) — 원본 POPULATION_SIZE=4
MEP_POPULATION_SIZE: 4

# 원본 ENTROPY_POOL=0.1
MEP_ENTROPY_ALPHA: 0.1

# Adaptive (S2)
MEP_USE_PRIORITIZED_SAMPLING: True   # 유지 (baseline 자체 기능)
MEP_PRIORITIZED_ALPHA: 1.0           # 원본에는 없음 → 1.0(uniform 가까움)으로 설정
S2_NUM_SEEDS: 10

NUM_SEEDS: 1           # S1은 항상 1
NUM_CHECKPOINTS: 3

model:
  # 백본 — 원본은 MLP 3×64지만 baseline은 RNN 구조 → hidden dim만 64로 맞춤
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  CNN_FEATURES: 25                   # 원본 NUM_FILTERS=25
  OBS_ENCODER: "CNNSimple"           # 원본 conv_and_mlp 스타일에 가장 가까움
  ACTIVATION: "relu"

  # PPO 핵심 — 원본 MEP 정확히 복원
  LR: 3e-4                            # 원본 PBT 5e-3 mutate → 우리는 m2 안정값 3e-4
  ANNEAL_LR: True
  LR_WARMUP: 0.05

  ENT_COEF: 0.01                      # 원본은 0.5지만 너무 큼 → 유지
  VF_COEF: 0.1                        # 원본 VF_COEF=0.1
  GAE_LAMBDA: 0.98                    # 원본 LAM=0.98
  # CLIP_EPS: 0.05                    # 원본 CLIPPING=0.05 (작은 trust region)
  CLIP_EPS: 0.2                       # PH2와 통일
  # MAX_GRAD_NORM: 0.1                # 원본 MAX_GRAD_NORM=0.1
  MAX_GRAD_NORM: 0.25                 # PH2와 통일

  # Rollout — 원본 sim_threads=50, episode 400, TOTAL_BATCH_SIZE=20000
  NUM_ENVS: 50
  NUM_STEPS: 400
  UPDATE_EPOCHS: 8                    # 원본 STEPS_PER_UPDATE=8
  # NUM_MINIBATCHES: 5                # 원본 MINIBATCHES=5
  # NUM_MINIBATCHES: 64               # PH2와 통일 (실제 NUM_ENVS=32와 호환 안됨: 32//64=0)
  NUM_MINIBATCHES: 8                  # PH2 비례 유지: envs/mb=32/8=4 (PH2: 256/64=4)

  # 학습 길이 — 원본 TOTAL_STEPS_PER_AGENT=1.5e7
  TOTAL_TIMESTEPS: 1.5e7
  S2_TOTAL_TIMESTEPS: 3e7
  REW_SHAPING_HORIZON: 1e7            # 유지 (원본 default 0이지만 우리는 1e7 유지)
  S2_REW_SHAPING_HORIZON: 3e7
