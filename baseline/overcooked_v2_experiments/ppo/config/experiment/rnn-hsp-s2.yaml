# @package _global_
# HSP Stage 2: Adaptive agent training against selected HSP population (MEP S2와 동일)
defaults:
  - override /model: rnn

ALG_NAME: "HSP_S2"

MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 1.0
# HSP_POPULATION_DIR은 런타임에 CLI로 주입: +HSP_POPULATION_DIR=<path>

NUM_SEEDS: 10
NUM_CHECKPOINTS: 3

model:
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  LR: 0.0003
  ENT_COEF: 0.0
  VF_COEF: 0.5
  GAE_LAMBDA: 0.95
  NUM_ENVS: 64
  NUM_STEPS: 128
  UPDATE_EPOCHS: 4
  NUM_MINIBATCHES: 4
  CLIP_EPS: 0.2
  MAX_GRAD_NORM: 0.5
  TOTAL_TIMESTEPS: 2e7
  REW_SHAPING_HORIZON: 2.5e6
  ANNEAL_LR: True
  LR_WARMUP: 0.05
