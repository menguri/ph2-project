# @package _global_
# HSP Stage 1 — ToyCoop (Dual Destination) 환경 전용
defaults:
  - override /model: rnn

ALG_NAME: "HSP_S1"

HSP_POPULATION_SIZE: 36
HSP_SELECTED_K: 18
HSP_EVENT_DIM: 1        # ToyCoop: delivery(task_complete)만 사용

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  OBS_ENCODER: "MLP"
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  LR: 0.0003
  NUM_ENVS: 512
  NUM_STEPS: 100
  NUM_MINIBATCHES: 2
  UPDATE_EPOCHS: 4
  TOTAL_TIMESTEPS: 5e7
  ENT_COEF: 0.005
  VF_COEF: 1.0
  MAX_GRAD_NORM: 0.5
  CLIP_EPS: 0.2
  GAE_LAMBDA: 0.9
  REW_SHAPING_HORIZON: 0
  ANNEAL_LR: True
  LR_WARMUP: 0.05
