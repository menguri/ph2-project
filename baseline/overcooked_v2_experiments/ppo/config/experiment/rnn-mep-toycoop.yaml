# @package _global_
# MEP 통합 — ToyCoop 전용
defaults:
  - override /model: rnn

ALG_NAME: "MEP"

MEP_POPULATION_SIZE: 4
MEP_ENTROPY_ALPHA: 0.01
MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 1.0
S2_NUM_SEEDS: 10

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  OBS_ENCODER: "MLP"
  LR: 0.0003
  NUM_ENVS: 512
  NUM_STEPS: 100
  NUM_MINIBATCHES: 2
  UPDATE_EPOCHS: 4
  TOTAL_TIMESTEPS: 1e8
  S2_TOTAL_TIMESTEPS: 1e8
  ENT_COEF: 0.005
  VF_COEF: 1.0
  MAX_GRAD_NORM: 0.5
  CLIP_EPS: 0.2
  GAE_LAMBDA: 0.9
  ANNEAL_LR: True
  LR_WARMUP: 0.05
