# @package _global_
# HSP 통합 config: S1(utility weight population) → Greedy Selection → S2(adaptive) 자동 진행
# HSP 논문 Table 9 기준 파라미터
defaults:
  - override /model: rnn

ALG_NAME: "HSP"

# Population (S1) — utility weight 기반 순차 학습
HSP_POPULATION_SIZE: 36
HSP_SELECTED_K: 18
HSP_EVENT_DIM: 13       # 원본 HSP 13종 (인덱스 순서 원본과 동일)

# Adaptive (S2) — Uniform sampling (논문 명시: "not prioritized like MEP")
MEP_USE_PRIORITIZED_SAMPLING: False
S2_NUM_SEEDS: 10

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  OBS_ENCODER: "CNNGamma"         # 논문 [32,64,32] 3×3 SAME
  ACTIVATION: "relu"
  LR: 5e-4                        # 논문 Table 9: 5e-4
  ANNEAL_LR: False                 # 논문에 annealing 없음
  ENT_COEF: 0.01                   # 논문 Table 9: 0.01
  VF_COEF: 1.0                     # 참조 코드 value_loss_coef=1.0
  GAE_LAMBDA: 0.95                 # 논문 Table 9: 0.95
  CLIP_EPS: 0.2                    # 논문 Table 9: 0.2
  MAX_GRAD_NORM: 10.0              # 논문 Table 9: 10.0
  UPDATE_EPOCHS: 15                # 논문 Table 9: 15
  NUM_MINIBATCHES: 1               # 논문 Table 9: full batch
  HUBER_DELTA: 10.0                # 논문 Table 9: huber loss delta=10.0
  USE_REWARD_NORM: True            # 논문 Table 9: reward normalization=True
  USE_VALUENORM: True              # 논문 Table 9: use valuenorm=True
  NUM_ENVS: 100                    # S1: 원본 n_rollout_threads=100
  NUM_STEPS: 400                   # 논문 episode_length=400
  TOTAL_TIMESTEPS: 1e7             # S1 per-policy timesteps (원본 10M)
  S2_TOTAL_TIMESTEPS: 3e7          # S2 timesteps (30M 유지)
  S2_NUM_ENVS: 200                 # S2: 논문 300 → 128 (GPU 메모리 제약)
  REW_SHAPING_HORIZON: 0           # S1: utility weight만, no annealing
  S2_REW_SHAPING_HORIZON: 3e7      # S2: 전체 학습 기간
