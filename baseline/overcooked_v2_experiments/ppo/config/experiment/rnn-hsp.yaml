# @package _global_
# HSP 통합 config: S1(utility weight population) → Greedy Selection → S2(adaptive) 자동 진행
defaults:
  - override /model: rnn

ALG_NAME: "HSP"

# Population (S1) — utility weight 기반 순차 학습
HSP_POPULATION_SIZE: 36
HSP_SELECTED_K: 18
HSP_EVENT_DIM: 13       # 원본 HSP 13종 (인덱스 순서 원본과 동일)

# Adaptive (S2)
MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 1.0
S2_NUM_SEEDS: 10

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  LR: 0.0003
  ENT_COEF: 0.0
  VF_COEF: 0.5
  GAE_LAMBDA: 0.95
  NUM_ENVS: 64
  NUM_STEPS: 128
  UPDATE_EPOCHS: 4
  NUM_MINIBATCHES: 4
  CLIP_EPS: 0.2
  MAX_GRAD_NORM: 0.5
  TOTAL_TIMESTEPS: 1e7       # S1 per-policy timesteps
  S2_TOTAL_TIMESTEPS: 2e7    # S2 timesteps
  REW_SHAPING_HORIZON: 0     # S1: utility weight만, no annealing
  S2_REW_SHAPING_HORIZON: 2.5e6   # S2: 일반 shaping 적용
  ANNEAL_LR: True
  LR_WARMUP: 0.05
