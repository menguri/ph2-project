# @package _global_
# HSP 통합 config: S1(utility weight population) → Greedy Selection → S2(adaptive) 자동 진행
defaults:
  - override /model: rnn

ALG_NAME: "HSP"

# Population (S1) — utility weight 기반 순차 학습
HSP_POPULATION_SIZE: 36
HSP_SELECTED_K: 18
HSP_EVENT_DIM: 13       # 원본 HSP 13종 (인덱스 순서 원본과 동일)

# Adaptive (S2)
MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 1.0
S2_NUM_SEEDS: 10

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  LR: 0.0005                  # 논문 Table 9: 5e-4
  ENT_COEF: 0.01             # 논문 Table 9: 0.01
  VF_COEF: 0.1               # MEP와 동일
  GAE_LAMBDA: 0.95           # 논문 Table 9: 0.95
  NUM_ENVS: 64
  NUM_STEPS: 128
  UPDATE_EPOCHS: 15           # 논문 Table 9: 15
  NUM_MINIBATCHES: 1          # 논문 Table 9: batch_size / mini-batch (= 1 full batch)
  CLIP_EPS: 0.2
  MAX_GRAD_NORM: 10.0         # 논문 Table 9: 10.0
  HUBER_DELTA: 10.0           # 논문 Table 9: huber loss delta=10.0
  USE_REWARD_NORM: True       # 논문 Table 9: use reward normalization=True
  TOTAL_TIMESTEPS: 1e7       # S1 per-policy timesteps (원본 10M)
  S2_TOTAL_TIMESTEPS: 3e7    # S2 timesteps
  REW_SHAPING_HORIZON: 0     # S1: utility weight만, no annealing
  S2_REW_SHAPING_HORIZON: 3e7   # S2: S2_TOTAL_TIMESTEPS와 일치
  ANNEAL_LR: True
  LR_WARMUP: 0.05
