# @package _global_
# GAMMA Stage 2: Adaptive agent — 논문 기준 파라미터
# GAMMA_POPULATION_DIR은 런타임에 CLI로 주입: +GAMMA_POPULATION_DIR=<path>
defaults:
  - override /model: rnn

ALG_NAME: "GAMMA_S2"

MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 3.0       # 원본 ALPHA=3.0

NUM_SEEDS: 10
NUM_CHECKPOINTS: 3

model:
  "GRU_HIDDEN_DIM": 64
  "FC_DIM_SIZE": 64
  "OBS_ENCODER": "CNNGamma"
  "ACTIVATION": "relu"
  "LR": 5e-4
  "ANNEAL_LR": False
  "ENT_COEF": 0.01
  "VF_COEF": 1.0
  "GAE_LAMBDA": 0.95
  "CLIP_EPS": 0.2
  "MAX_GRAD_NORM": 10.0
  "UPDATE_EPOCHS": 15
  "NUM_MINIBATCHES": 1
  "NUM_ENVS": 200               # 논문 S2: 200 parallel envs
  "NUM_STEPS": 400
  "TOTAL_TIMESTEPS": 3e7        # 30M 유지
  "REW_SHAPING_HORIZON": 3e7    # 전체 기간
