# @package _global_
# rnn-mep-s1: rnn-mep.yaml과 동일한 파라미터 (Stage 1 분리 실행용)
# 원본 MEP (zsc-basecamp/MEP, human_aware_rl/PBT) 파라미터에 정렬.
defaults:
  - override /model: rnn

ALG_NAME: "MEP_S1"

# Population — 원본 POPULATION_SIZE=4
MEP_POPULATION_SIZE: 4
MEP_ENTROPY_ALPHA: 0.1               # 원본 ENTROPY_POOL=0.1

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  CNN_FEATURES: 25                   # 원본 NUM_FILTERS=25
  OBS_ENCODER: "CNNSimple"
  ACTIVATION: "relu"

  LR: 3e-4                            # m2 안정값
  ANNEAL_LR: True
  LR_WARMUP: 0.05

  ENT_COEF: 0.01
  VF_COEF: 0.1                        # 원본 VF_COEF=0.1
  GAE_LAMBDA: 0.98                    # 원본 LAM=0.98
  CLIP_EPS: 0.05                      # 원본 CLIPPING=0.05
  MAX_GRAD_NORM: 0.1                  # 원본 MAX_GRAD_NORM=0.1

  NUM_ENVS: 50                        # 원본 sim_threads=50
  NUM_STEPS: 400
  UPDATE_EPOCHS: 8                    # 원본 STEPS_PER_UPDATE=8
  NUM_MINIBATCHES: 5                  # 원본 MINIBATCHES=5

  TOTAL_TIMESTEPS: 1.5e7              # 원본 TOTAL_STEPS_PER_AGENT=1.5e7
  REW_SHAPING_HORIZON: 1e7
