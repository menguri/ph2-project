# @package _global_
defaults:
  - override /model: rnn

ALG_NAME: "MEP_S1"

# MEP-specific
MEP_POPULATION_SIZE: 4
MEP_ENTROPY_ALPHA: 0.1       # 원본 MEP ENTROPY_POOL=0.1

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3  # init / mid / final per population member

model:
  "GRU_HIDDEN_DIM": 64
  "FC_DIM_SIZE": 64
  "LR": 0.0003
  "ENT_COEF": 0.01
  "VF_COEF": 0.1              # 원본 MEP VF_COEF=0.1
  "GAE_LAMBDA": 0.98           # 원본 MEP LAM=0.98
  "NUM_ENVS": 64
  "NUM_STEPS": 128
  "UPDATE_EPOCHS": 8            # 원본 MEP STEPS_PER_UPDATE=8
  "NUM_MINIBATCHES": 5          # 원본 MEP MINIBATCHES=5
  "CLIP_EPS": 0.05              # 원본 MEP CLIPPING=0.05
  "MAX_GRAD_NORM": 0.1          # 원본 MEP MAX_GRAD_NORM=0.1
  "TOTAL_TIMESTEPS": 1e7
  "REW_SHAPING_HORIZON": 1e7
  "ANNEAL_LR": True
  "LR_WARMUP": 0.05
