# @package _global_
# GAMMA Stage 1: Population training with entropy bonus (MEP S1과 동일 알고리즘, GRU_HIDDEN_DIM=64)
defaults:
  - override /model: rnn

ALG_NAME: "GAMMA_S1"

MEP_POPULATION_SIZE: 4
MEP_ENTROPY_ALPHA: 0.01

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  GRU_HIDDEN_DIM: 64
  FC_DIM_SIZE: 64
  LR: 0.0003
  ENT_COEF: 0.0
  VF_COEF: 0.5
  GAE_LAMBDA: 0.95
  NUM_ENVS: 64
  NUM_STEPS: 128
  UPDATE_EPOCHS: 4
  NUM_MINIBATCHES: 4
  CLIP_EPS: 0.2
  MAX_GRAD_NORM: 0.5
  TOTAL_TIMESTEPS: 3e7
  REW_SHAPING_HORIZON: 2.5e6
  ANNEAL_LR: True
  LR_WARMUP: 0.05
