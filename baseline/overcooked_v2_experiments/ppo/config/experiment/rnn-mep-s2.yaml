# @package _global_
defaults:
  - override /model: rnn

ALG_NAME: "MEP_S2"

# MEP-specific
MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 0.5
# MEP_POPULATION_DIR is injected at runtime via CLI: +MEP_POPULATION_DIR=<path>

NUM_SEEDS: 10
NUM_CHECKPOINTS: 0

model:
  "LR": 0.0007
  "LR_CRITIC": 0.0007
  "ENT_COEF": 0.01
  "GAE_LAMBDA": 0.9
  "NUM_ENVS": 64
  "NUM_STEPS": 128
  "UPDATE_EPOCHS": 4
  "NUM_MINIBATCHES": 4
  "CLIP_EPS": 0.2
  "MAX_GRAD_NORM": 0.5
  "TOTAL_TIMESTEPS": 2e7
  "REW_SHAPING_HORIZON": 2.5e6
  "ANNEAL_LR": True
  "LR_WARMUP": 0.05
