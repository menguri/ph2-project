# @package _global_
# GAMMA 통합 config: S1(population) → S2(adaptive) 자동 진행
# GAMMA 논문 Table 기준 파라미터
defaults:
  - override /model: rnn

ALG_NAME: "GAMMA"

# Population (S1)
MEP_POPULATION_SIZE: 8           # GAMMA 원본 gen_mep_agents.sh 기준
MEP_ENTROPY_ALPHA: 0.01          # 원본 mep_entropy_alpha=0.01

# Adaptive (S2)
MEP_USE_PRIORITIZED_SAMPLING: True
MEP_PRIORITIZED_ALPHA: 3.0       # 원본 ALPHA=3.0
S2_NUM_SEEDS: 10
GAMMA_S2_METHOD: "vae"

# VAE (논문 Table 기준 — 이미 일치)
GAMMA_VAE_Z_DIM: 16
GAMMA_VAE_HIDDEN_DIM: 256
GAMMA_VAE_LR: 0.0005
GAMMA_VAE_EPOCHS: 500
GAMMA_VAE_BATCH_SIZE: 64
GAMMA_VAE_CHUNK_LENGTH: 100
GAMMA_VAE_KL_PENALTY: 1.0
GAMMA_VAE_KL_INIT: 0.01          # GAMMA 원본 train_vae.sh 기준
GAMMA_VAE_ROLLOUT_EPISODES: 100
GAMMA_VAE_Z_CHANGE_PROB: 0.0

NUM_SEEDS: 1
NUM_CHECKPOINTS: 3

model:
  # Network — 논문 Cooperator: [32,64,32] 3×3 CNN, GRU(64), FC(64), ReLU
  "GRU_HIDDEN_DIM": 64
  "FC_DIM_SIZE": 64
  "OBS_ENCODER": "CNNGamma"       # 논문 [32,64,32] all 3×3
  "ACTIVATION": "relu"

  # PPO — 논문 Table 기준
  "LR": 5e-4                      # 논문 lr=0.0005
  "ANNEAL_LR": False               # 논문에 없음
  "ENT_COEF": 0.01
  "VF_COEF": 1.0                   # 원본 코드 value_loss_coef=1.0
  "GAE_LAMBDA": 0.95
  # "CLIP_EPS": 0.2                # 논문 clip=0.2
  "CLIP_EPS": 0.2                  # PH2와 통일 (원본도 같은 값)
  "MAX_GRAD_NORM": 10.0
  "UPDATE_EPOCHS": 15              # 논문 ppo_epoch=15
  # "NUM_MINIBATCHES": 1           # 논문 full batch (num_mini_batch=1)
  # "NUM_MINIBATCHES": 64          # PH2와 통일 (실제 NUM_ENVS=32와 호환 안됨: 32//64=0)
  "NUM_MINIBATCHES": 8             # PH2 비례 유지: envs/mb=32/8=4 (PH2: 256/64=4)

  # S1 환경 — 원본 n_rollout_threads=100
  "NUM_ENVS": 100
  "NUM_STEPS": 400                 # 논문 episode_length=400

  # 학습 길이
  "TOTAL_TIMESTEPS": 1e7           # S1
  "S2_TOTAL_TIMESTEPS": 3e7        # S2 (30M 유지)
  "REW_SHAPING_HORIZON": 1e7       # S1: 전체 기간
  "S2_REW_SHAPING_HORIZON": 3e7    # S2: 전체 기간 (논문: shaping=전체)
  "USE_VALUENORM": True            # 원본 GAMMA: ValueNorm β=0.99999 (use_valuenorm=True)
  "HUBER_DELTA": 10.0              # 원본 GAMMA: use_huber_loss=True, huber_delta=10.0

# MAPPO centralized critic (원본 GAMMA: use_centralized_V=True)
MAPPO_MODE: True
